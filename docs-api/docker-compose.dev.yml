services:
  db:
    image: postgres:16-alpine
    container_name: docs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docs
    ports:
      - "5433:5432"
    volumes:
      - docs-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  docs-db-data:
